name: Atnaujinti TV Programa

on:
  schedule:
    - cron: '0 3 * * *' # Kiekvieną naktį 03:00 val. ryte
  workflow_dispatch: # Leidžia paleisti rankiniu būdu bet kada

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Tikrinti koda
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Atsisiųsti ir tiesiogiai pakeisti XML
        run: |
          # Naudojame išvalytą, lengvą ir 100% veikiantį tikros Lietuvos TV programos failą
          curl -sL "https://raw.githubusercontent.com/Hex0001/TV-EPG-Lithuania/main/lithuania.xml" -o programa.xml
          
          if [ -s programa.xml ]; then
            echo "Failas sėkmingai gautas."
          else
            echo "Klaida: Nepavyko gauti duomenų."
            exit 1
          fi

      - name: Issaugoti pakeitimus saugykloje
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add programa.xml
          git commit -m "Automatinis TV programos atnaujinimas [skip ci]" || echo "Nėra pakeitimų"
          git push origin main
