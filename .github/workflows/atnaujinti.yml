name: Atnaujinti TV Programa

on:
  schedule:
    - cron: '0 3 * * *' # Kiekvieną naktį 03:00 val. ryte
  workflow_dispatch: # Leidžia paleisti rankiniu būdu

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Tikrinti koda
        uses: actions/checkout@v4

      - name: Paruošti Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Sukurti naują programa.xml
        run: python generuoti.py

      - name: Issaugoti pakeitimus
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add programa.xml
          git commit -m "Automatinis TV programos atnaujinimas [skip ci]" || exit 0
          git push
