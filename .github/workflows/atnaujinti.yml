name: Atnaujinti TV Programa

on:
  schedule:
    - cron: '0 3 * * *' # Kiekvieną naktį 03:00 val.
  workflow_dispatch: # Leidžia paleisti rankiniu būdu bet kada

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Tikrinti koda
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Atsisiųsti oficialų EPG ir išfiltruoti Lietuvą
        run: |
          echo "Siunčiamas pasaulinis EPG šaltinis..."
          # Atsisiunčiame oficialų iptv-org EPG gairių failą (suspaustą)
          curl -sL "https://iptv-org.github.io/epg/guides/lt/tv24.lt.xml" -o programa.xml

          # Saugiklis: Jei tv24.lt būtų nepasiekiamas, naudojame bendrą atsarginį kanalų gidą
          if [ ! -s programa.xml ] || grep -q "404" programa.xml; then
            echo "Pagrindinis šaltinis nepasiekiamas, siunčiamas alternatyvus..."
            curl -sL "https://raw.githubusercontent.com/iptv-org/epg/master/guides/lt/tv3.lt.xml" -o programa.xml
          fi

          # Galutinis patikrinimas, ar failas egzistuoja ir turi turinį
          if [ -s programa.xml ]; then
            echo "Failas sėkmingai paruoštas."
          else
            echo "Klaida: Nepavyko gauti jokių EPG duomenų."
            exit 1
          fi

      - name: Issaugoti pakeitimus saugykloje
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add programa.xml
          git commit -m "Automatinis TV programos atnaujinimas [skip ci]" || echo "Nėra pakeitimų"
          git push origin main
