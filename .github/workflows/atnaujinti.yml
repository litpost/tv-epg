name: Atnaujinti TV Programa

on:
  schedule:
    - cron: '0 3 * * *' # Kiekvieną naktį 03:00 val. ryte
  workflow_dispatch: # Leidžia paleisti rankiniu būdu bandymams

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Tikrinti koda
        uses: actions/checkout@v4

      - name: Atsisiusti naujausia EPG
        run: |
          # Naudojame oficialią ir veikiančią iptv-org Lietuvos EPG nuorodą
          # -f parametras užtikrina, kad jei serveris mes klaidą, robotas neįrašys nesąmonių
          curl -f -sL https://iptv-org.github.io/epg/guides/lt/lt.xml -o programa.xml

      - name: Issaugoti pakeitimus
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add programa.xml
          # [skip ci] neleidžia robotui užsiciklinti ir paleidinėti savęs be galo
          git commit -m "Automatinis TV programos atnaujinimas [skip ci]" || exit 0
          git push
