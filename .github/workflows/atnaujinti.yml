name: Atnaujinti TV Programa

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Tikrinti koda
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Paruošti Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Paleisti generatoriu
        run: python generuoti.py

      - name: Issaugoti pakeitimus saugykloje
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add programa.xml
          git commit -m "Automatinis TV programos atnaujinimas [skip ci]" || echo "Nėra pakeitimų"
          git push origin main
