name: Atnaujinti TV Programa

on:
  schedule:
    - cron: '0 3 * * *' # Kiekvieną naktį 03:00 val.
  workflow_dispatch: # Leidžia paleisti rankiniu būdu bet kada

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Tikrinti koda
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Atsisiųsti oficialų Lietuvos EPG
        run: |
          echo "Siunčiamas oficialus iptv-org Lietuvos gidas..."
          # Atsisiunčiame tiesioginį tv24.lt gidą iš iptv-org serverio
          curl -sL "https://iptv-org.github.io/epg/guides/lt/tv24.lt.xml" -o programa.xml

          # Saugiklis: Jei pagrindinis serveris streikuotų, paimame atsarginį tv3.lt šaltinį
          if [ ! -s programa.xml ] || grep -q "404" programa.xml; then
            echo "Atsarginis šaltinis..."
            curl -sL "https://iptv-org.github.io/epg/guides/lt/tv3.lt.xml" -o programa.xml
          fi

          if [ -s programa.xml ]; then
            echo "Failas sėkmingai gautas ir įrašytas."
          else
            echo "Klaida: Nepavyko gauti duomenų."
            exit 1
          fi

      - name: Issaugoti pakeitimus saugykloje
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add programa.xml
          git commit -m "Automatinis TV programos atnaujinimas [skip ci]" || echo "Nėra pakeitimų"
          git push origin main
